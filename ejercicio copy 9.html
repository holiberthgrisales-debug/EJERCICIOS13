<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
for (let i = 1; i <= 5; i++) {
  console.log(`Iteración número ${i}`);
}

for (let i = 5; i >= 1; i--) {
  console.log(`Cuenta regresiva: ${i}`);
}

for (let i = 1; i <= 10; i++) {
  console.log(`7 x ${i} = ${7 * i}`);
}
    </script>
</body>
</html>
