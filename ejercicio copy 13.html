<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
function saludar(nombre) {
  return `¡Hola, ${nombre}!`;
}

function sumar(a, b) {
  return a + b;
}

function esPar(numero) {
  return numero % 2 === 0;
}

console.log(saludar("María"));
console.log(sumar(3, 7));
console.log(esPar(4));
console.log(esPar(7));
    </script>
</body>
</html>
